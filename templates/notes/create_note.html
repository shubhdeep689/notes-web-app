{% extends 'base.html' %}

{% block title %}
Create Note
{% endblock %}

{% block content %}

<div class="row justify-content-center">

<div class="col-lg-8">

    <div class="card shadow-sm">

        <div class="card-header bg-dark text-white">
            <h3 class="mb-0">
                Create New Note
            </h3>
        </div>

        <div class="card-body">

            <form method="POST">

                {% csrf_token %}

                <div class="mb-3">

                    <label class="form-label">
                        Title
                    </label>

                    <input
                        type="text"
                        name="title"
                        class="form-control"
                        placeholder="Enter note title"
                        required
                    >

                </div>

                <div class="mb-3">

                    <label class="form-label">
                        Content
                    </label>

                    <textarea
                        name="content"
                        rows="8"
                        class="form-control"
                        placeholder="Write your note here..."
                        required
                    ></textarea>

                </div>

                <div class="d-flex gap-2">

                    <button type="submit" class="btn btn-primary">
                        Save Note
                    </button>

                    <a href="{% url 'note_list' %}"
                       class="btn btn-secondary">
                        Cancel
                    </a>

                </div>

            </form>

        </div>

    </div>

</div>


</div>

{% endblock %}
